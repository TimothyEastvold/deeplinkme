<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Claude Code</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, serif;
    background: #f5f5f5;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border: 1px solid #e8e0d8;
    border-radius: 8px;
    padding: 48px 40px;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }
  h1 {
    font-size: 20px;
    color: #e8630a;
    margin-bottom: 16px;
  }
  p { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 16px; }
  .prompt {
    background: #faf6f3;
    border: 1px solid #e8e0d8;
    border-radius: 6px;
    padding: 16px;
    font-size: 14px;
    color: #333;
    text-align: left;
    word-break: break-word;
    margin-bottom: 20px;
    max-height: 200px;
    overflow-y: auto;
  }
  .meta {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
  }
  .meta span { color: #e8630a; font-weight: 700; }
  a.btn {
    display: inline-block;
    background: #e8630a;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 32px;
    border-radius: 6px;
    margin-bottom: 12px;
  }
  a.btn:hover { background: #cf5808; }
  .fallback { font-size: 13px; color: #999; }
  .fallback code {
    display: block;
    background: #faf6f3;
    border: 1px solid #e8e0d8;
    border-radius: 4px;
    padding: 12px;
    font-size: 12px;
    text-align: left;
    word-break: break-all;
    margin-top: 8px;
    user-select: all;
  }
  .copy-btn {
    display: inline-block;
    background: #777;
    color: #fff;
    border: none;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
    font-family: Georgia, serif;
  }
  .copy-btn:hover { background: #555; }
  #status { margin-top: 12px; font-size: 13px; color: #999; }
</style>
</head>
<body>
<div class="card">
  <h1>Launch Claude Code</h1>
  <div id="content">
    <p>Reading parameters...</p>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q') || '';
  var distro = params.get('distro') || '';
  var path = params.get('path') || '';
  var content = params.get('content') || '';

  if (!q) {
    document.getElementById('content').innerHTML =
      '<p>No prompt provided. Add <code>?q=your+prompt</code> to the URL.</p>';
    return;
  }

  // Build the claude-cli:// URL, preserving original encoding
  var clUrl = 'claude-cli://open?q=' + encodeURIComponent(q);
  if (distro) clUrl += '&distro=' + encodeURIComponent(distro);
  if (path) clUrl += '&path=' + encodeURIComponent(path);
  if (content) clUrl += '&content=' + encodeURIComponent(content);

  // Build the display
  var targetLabel = distro
    ? '<span>' + escHtml(distro) + '</span> at <span>' + escHtml(path) + '</span>'
    : 'Windows Notes (default)';

  // Build a pasteable command for the fallback
  var cmd = 'claude';
  if (q) cmd += ' "' + q.replace(/"/g, '\\"') + '"';
  // Note: distro/path are handled by the protocol handler, not the CLI directly

  document.getElementById('content').innerHTML =
    '<div class="prompt">' + escHtml(q) + '</div>' +
    '<div class="meta">Target: ' + targetLabel + '</div>' +
    '<a class="btn" id="launch" href="' + escAttr(clUrl) + '">Open in Claude Code</a>' +
    '<div id="status"></div>' +
    '<div class="fallback" style="margin-top:24px;">' +
      'If the button does not work, copy this URL and paste it in your browser address bar:' +
      '<code id="raw-url">' + escHtml(clUrl) + '</code>' +
      '<button class="copy-btn" onclick="copyUrl()">Copy URL</button>' +
    '</div>';

  // Auto-launch after a brief delay (gives the page time to render)
  setTimeout(function() {
    window.location.href = clUrl;
    // Show a status message after a moment
    setTimeout(function() {
      var el = document.getElementById('status');
      if (el) el.textContent = 'Protocol handler triggered. If nothing opened, click the button above.';
    }, 1500);
  }, 300);

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function escAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();

function copyUrl() {
  var el = document.getElementById('raw-url');
  if (el) {
    var text = el.textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied'; setTimeout(function(){ btn.textContent = 'Copy URL'; }, 2000); }
    });
  }
}
</script>
</body>
</html>
